<!DOCTYPE html>
<!-- DOCTYPE le dice al navegador que use el estándar HTML5 -->
 
<html lang="es">
<!-- lang="es" indica al navegador que el contenido está en español -->
 
<head>
  <!-- HEAD: configuración y recursos, no se muestra en pantalla -->
 
  <!-- charset: permite tildes, ñ y caracteres especiales -->
  <meta charset="UTF-8" />
 
  <!-- viewport: hace la página responsive en celulares -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
 
  <!-- title: texto que aparece en la pestaña del navegador -->
  <title>Gestión de Productos</title>
 
  <!-- link: conecta el archivo CSS externo -->
  <link rel="stylesheet" href="style.css" />
</head>
 
<body>
  <!-- BODY: todo el contenido visible va aquí -->
 
  <!-- ── CONTENEDOR PRINCIPAL ──
       <div class="app"> envuelve toda la aplicación.
       La clase permite aplicarle estilos desde CSS. -->
  <div class="app">
 
    <!-- HEADER: título y subtítulo de la app -->
    <header class="app__header">
      <!-- h1: título principal, solo debe existir uno por página (SEO) -->
      <h1 class="app__title">📦 Productos</h1>
      <!-- p: párrafo, usado aquí como descripción corta -->
      <p class="app__subtitle">Administrá tu inventario</p>
    </header>
 
    <!-- ── FORMULARIO PARA AGREGAR PRODUCTO ──
         Usamos <div> en lugar de <form> para controlar
         el envío 100% desde JavaScript sin recargar la página. -->
    <div class="form">
 
      <!-- input nombre: campo de texto para el nombre del producto.
           id="input-nombre" → JS lo referencia con getElementById().
           placeholder       → texto de ayuda que desaparece al escribir.
           maxlength="60"    → límite de caracteres. -->
      <input
        type="text"
        id="input-nombre"
        class="form__input"
        placeholder="Nombre del producto..."
        maxlength="60"
      />
 
      <!-- input precio: type="number" solo acepta valores numéricos.
           min="0" → evita precios negativos desde el HTML. -->
      <input
        type="number"
        id="input-precio"
        class="form__input form__input--corto"
        placeholder="Precio $"
        min="0"
      />
 
      <!-- input stock: cantidad disponible del producto -->
      <input
        type="number"
        id="input-stock"
        class="form__input form__input--corto"
        placeholder="Stock"
        min="0"
      />
 
      <!-- button: al hacer click JS llama a agregarProducto() -->
      <button id="btn-agregar" class="form__btn">Agregar</button>
    </div>
 
    <!-- ── BARRA DE BÚSQUEDA ──
         Filtra productos en tiempo real mientras el usuario escribe.
         El evento 'input' en JS escucha cada tecla presionada. -->
    <div class="busqueda">
      <input
        type="text"
        id="input-busqueda"
        class="busqueda__input"
        placeholder="🔍  Buscar producto..."
      />
 
      <!-- select: menú desplegable para ordenar la lista.
           data-orden="..." → JS lee el valor con dataset.orden -->
      <select id="select-orden" class="busqueda__select">
        <option value="reciente">Más reciente</option>
        <option value="nombre">Nombre A-Z</option>
        <option value="precio-asc">Precio ↑</option>
        <option value="precio-desc">Precio ↓</option>
        <option value="stock">Stock</option>
      </select>
    </div>
 
    <!-- ── TABLA DE PRODUCTOS ──
         <table> estructura datos en filas y columnas.
         <thead> = encabezados, <tbody> = filas de datos.
         JS rellena el <tbody> dinámicamente con renderizar(). -->
    <div class="tabla-wrapper">
      <!-- tabla-wrapper: contenedor con overflow-x:auto para scroll en móvil -->
      <table class="tabla" id="tabla-productos">
 
        <thead>
          <!-- <tr> = fila, <th> = celda de encabezado (negrita por defecto) -->
          <tr>
            <th>Producto</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
          </tr>
        </thead>
 
        <!-- tbody vacío: JavaScript inserta aquí los <tr> con cada producto -->
        <tbody id="tbody-productos">
          <!-- Las filas se generan desde app.js con innerHTML -->
        </tbody>
 
      </table>
    </div>
 
    <!-- ── PIE DE PÁGINA ──
         Muestra estadísticas globales del inventario.
         JS actualiza el contenido con textContent. -->
    <footer class="app__footer">
      <span id="contador-productos">0 productos</span>
      <span id="valor-total">Total: $0</span>
      <!-- button: elimina todos los productos con stock = 0 -->
      <button id="btn-limpiar" class="btn-limpiar">Eliminar sin stock</button>
    </footer>
 
  </div>
  <!-- fin .app -->
 
  <!-- <script> al FINAL del body: garantiza que todo el HTML
       esté cargado antes de que JS intente acceder al DOM. -->
  <script src="app.js"></script>
</body>
</html>
